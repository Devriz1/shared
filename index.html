<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My File Center</title>
    <style>
        /* 💡 DEFAULT LIGHT THEME VARIABLES */
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #666666;
            --primary-color: #24292e; /* GitHub Gray */
            --accent-color: #0366d6;  /* Link Blue */
            --border-color: #eeeeee;
            --btn-disabled: #8cc2ff;
            --shadow-color: rgba(0, 0, 0, 0.05);
        }

        /* 🌙 AUTOMATIC DARK THEME VARIABLES (Triggers via OS/Browser setup) */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0d1117;
                --card-bg: #161b22;
                --text-color: #c9d1d9;
                --text-muted: #8b949e;
                --primary-color: #f0f6fc;
                --accent-color: #58a6ff;
                --border-color: #30363d;
                --btn-disabled: #1f4e79;
                --shadow-color: rgba(0, 0, 0, 0.3);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        
        header p {
            color: var(--text-muted);
        }

        .file-list {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 12px var(--shadow-color);
            padding: 10px 0;
            list-style: none;
            border: 1px solid var(--border-color);
            transition: background 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-info {
            display: flex;
            flex-direction: column;
        }

        .file-name {
            font-weight: 600;
            color: var(--primary-color);
        }

        .file-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .download-btn {
            background-color: var(--accent-color);
            color: #ffffff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.2s ease, transform 0.1s ease;
            border: none;
            cursor: pointer;
        }

        /* Adjusted dark/light accessible hover states */
        @media (prefers-color-scheme: dark) {
            .download-btn { color: #0d1117; font-weight: 600; }
            .download-btn:hover { background-color: #79b8ff; }
        }
        @media (prefers-color-scheme: light) {
            .download-btn:hover { background-color: #024ea3; }
        }
        
        .download-btn:disabled {
            background-color: var(--btn-disabled);
            cursor: not-allowed;
            color: var(--text-muted);
        }

        .loading, .error-msg {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Shared Downloads</h1>
        <p>Direct access to my GitHub repository files</p>
    </header>

    <ul class="file-list" id="fileList">
        <li class="loading">Fetching latest files from GitHub...</li>
    </ul>
</div>

<script>
    // ⚙️ CONFIGURATION: Cleaned up your configuration settings
    const GITHUB_USERNAME = "Devriz1";
    const REPO_NAME = "shared";
    const FOLDER_PATH = "exe"; 

    const fileListElement = document.getElementById('fileList');

    // Function to convert bytes into clean human-readable text
    function formatBytes(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // Function to fetch the last commit date for a specific file path
    async function fetchFileDate(filePath) {
        const commitsUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/commits?path=${filePath}&per_page=1`;
        try {
            const res = await fetch(commitsUrl);
            if (!res.ok) return null;
            const commits = await res.json();
            if (commits && commits.length > 0) {
                const dateStr = commits[0].commit.committer.date;
                return new Date(dateStr).toLocaleString(); // Formats into local user timezone/view
            }
        } catch (e) {
            console.error("Error fetching date for: " + filePath, e);
        }
        return "Unknown";
    }

    async function fetchGitHubFiles() {
        const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FOLDER_PATH}`;
        
        try {
            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error('Failed to fetch repository data. Ensure repo is public.');
            
            const files = await response.json();
            fileListElement.innerHTML = ''; // Wipe loading message

            // Filter out system documentation or layout code files
            const downloadableFiles = files.filter(file => file.type === 'file' && file.name !== 'README.md' && file.name !== 'index.html');

            if (downloadableFiles.length === 0) {
                fileListElement.innerHTML = '<li class="loading">No files found in this folder.</li>';
                return;
            }

            // Using a structured for...of loop to cleanly handle asynchronous template updates
            for (const file of downloadableFiles) {
                const li = document.createElement('li');
                li.className = 'file-item';

                // Unique placeholder string safe for DOM IDs
                const uniqueId = `date-${btoa(encodeURIComponent(file.name)).replace(/=/g, '')}`;

                // Structure the data row text with metadata wrapper
                li.innerHTML = `
                    <div class="file-info">
                        <span class="file-name">${file.name}</span>
                        <div class="file-meta">
                            <span>Size: ${formatBytes(file.size)}</span> | 
                            <span>Uploaded: <span id="${uniqueId}">Loading...</span></span>
                        </div>
                    </div>
                `;

                // Generate button and map custom direct download function to it
                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'download-btn';
                downloadBtn.innerText = 'Download';
                
                downloadBtn.onclick = async () => {
                    downloadBtn.disabled = true;
                    downloadBtn.innerText = 'Downloading...';
                    
                    try {
                        // 1. Fetch file as a binary stream
                        const fileResponse = await fetch(file.download_url);
                        const fileBlob = await fileResponse.blob();
                        
                        // 2. Wrap payload inside a virtual, localized URL object
                        const localUrl = window.URL.createObjectURL(fileBlob);
                        
                        // 3. Inject a silent temporary hyperlink element and fire it
                        const hiddenLink = document.createElement('a');
                        hiddenLink.href = localUrl;
                        hiddenLink.download = file.name; 
                        document.body.appendChild(hiddenLink);
                        hiddenLink.click();
                        
                        // 4. Garbage collection house-cleaning tasks
                        window.URL.revokeObjectURL(localUrl);
                        document.body.removeChild(hiddenLink);
                        
                        downloadBtn.innerText = 'Download';
                        downloadBtn.disabled = false;
                    } catch (err) {
                        console.error('Blob capture routine failed:', err);
                        window.open(file.download_url, '_blank');
                        downloadBtn.innerText = 'Download';
                        downloadBtn.disabled = false;
                    }
                };

                li.appendChild(downloadBtn);
                fileListElement.appendChild(li);

                // Fetch upload/commit data in background to prevent interface blocking
                fetchFileDate(file.path).then(formattedDate => {
                    const dateSpan = document.getElementById(uniqueId);
                    if (dateSpan) {
                        dateSpan.textContent = formattedDate || "Unknown";
                    }
                });
            }

        } catch (error) {
            console.error(error);
            fileListElement.innerHTML = `<li class="error-msg">Error loading files. Ensure configuration parameters match exactly.</li>`;
        }
    }

    // Fire application engine initialization
    fetchGitHubFiles();
</script>

</body>
</html>
